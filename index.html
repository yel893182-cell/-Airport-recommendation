<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全验证 - 机场推荐合集</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #60a5fa;
            --success: #22c55e;
            --text: #e5e7eb;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            font-family: -apple-system, sans-serif;
            color: var(--text);
        }

        /* 全屏拦截层 */
        #verify-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .verify-card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            width: 90%;
            max-width: 350px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .verify-card h2 {
            margin: 0 0 10px;
            color: var(--primary);
            font-size: 22px;
        }

        .verify-card p {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        /* 验证码容器 */
        .cf-turnstile {
            margin: 0 auto;
            min-height: 65px;
        }

        /* 内容容器 - 初始隐藏 */
        #main-content {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* 页面装饰样式 */
        header {
            background: linear-gradient(135deg, #1e40af, #7e22ce);
            padding: 40px 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .content-body {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        .info-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .link-btn {
            display: block;
            background: var(--success);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="verify-overlay">
    <div class="verify-card">
        <h2>安全验证</h2>
        <p>请点击下方进行人机验证</p>
        <div class="cf-turnstile" 
             data-sitekey="0x4AAAAAADF3hC0FcwaMxvx3" 
             data-callback="onVerifySuccess"
             data-theme="dark">
        </div>
        <div id="error-msg" style="color: #ef4444; font-size: 12px; margin-top: 15px; display: none;">
            验证码加载失败，请检查网络或刷新重试
        </div>
    </div>
</div>

<div id="main-content">
    <header>✈️ 机场推荐合集【小秋】</header>
    
    <div class="content-body">
        <div class="info-card">
            <h3>📌 节点说明</h3>
            <p>本列表仅供个人学习科研使用，请遵守当地法律法规。</p>
        </div>

        <div class="info-card">
            <h3>🔗 推荐列表</h3>
            <p><strong>良心云</strong> - 稳定直连</p>
            <a href="https://xn--9kqz23b19z.com/#/register?code=UTpQq1dO" class="link-btn">立即访问</a>
            
            <p style="margin-top:20px;"><strong>蓝莓桥</strong> - 备用多线</p>
            <a href="https://berrypass.net/#/register?code=rHhSH0vz" class="link-btn">入口 1</a>
        </div>
    </div>
</div>

<script>
    // 验证成功后的回调函数
    function onVerifySuccess(token) {
        console.log("验证通过");
        const overlay = document.getElementById('verify-overlay');
        const main = document.getElementById('main-content');

        // 1. 隐藏验证层
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
            
            // 2. 显示主内容
            main.style.display = 'block';
            setTimeout(() => {
                main.style.opacity = '1';
            }, 50);
        }, 500);
    }

    // 检测脚本加载是否失败
    window.addEventListener('load', function() {
        setTimeout(() => {
            const container = document.querySelector('.cf-turnstile');
            if (container && container.innerHTML === "") {
                document.getElementById('error-msg').style.display = 'block';
            }
        }, 5000); // 5秒后如果还没加载出来就显示错误
    });
</script>

</body>
</html>
