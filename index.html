<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>机场推荐合集【小秋】</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #e5e7eb;
            --text-muted: #94a3b8;
            --accent-blue: #60a5fa;
            --accent-green: #22c55e;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- 人机验证层 --- */
        #fullscreen-lock {
            position: fixed;
            inset: 0; /* 替代 top/left/width/height */
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.5s ease;
        }

        .verify-box {
            text-align: center;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 1px solid #334155;
        }

        .verify-box h3 { margin: 0 0 10px; color: var(--accent-blue); font-size: 24px; }
        .verify-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 25px; }

        /* --- 动态加载容器 --- */
        #app-container {
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* --- 页面主体样式 --- */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #1e3a8a, #9333ea);
            font-size: 28px;
            font-weight: 800;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .container {
            padding: 30px 20px;
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: var(--card-bg);
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card h2 { margin-top: 0; color: var(--accent-blue); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 20px; }

        /* 标签样式优化 */
        .tags-container { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag {
            background: #334155;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            transition: all 0.2s;
            cursor: default;
        }
        .tag:hover { background: var(--accent-blue); color: #fff; transform: translateY(-2px); }

        /* 链接网格化设计 (重点优化部分) */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .link-item {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .link-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
            box-shadow: 0 5px 15px rgba(96, 165, 250, 0.2);
        }

        .link-title { font-weight: bold; font-size: 18px; margin-bottom: 5px; }
        .link-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 15px; height: 18px; }

        .btn {
            display: inline-block;
            background: var(--accent-green);
            color: #fff;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
            width: calc(100% - 40px);
        }
        .btn:hover { background: #16a34a; }
        .btn-group { display: flex; gap: 10px; }
        .btn-group .btn { width: 100%; padding: 8px 0; }

        footer { text-align: center; padding: 20px; font-size: 13px; color: var(--text-muted); }
    </style>
</head>
<body>

<script>
// 验证成功后的执行逻辑
function onSuccess(token) {
    const lockScreen = document.getElementById('fullscreen-lock');
    const appContainer = document.getElementById('app-container');
    const template = document.getElementById('real-content');

    // 1. 锁屏层淡出
    lockScreen.style.opacity = '0';
    
    setTimeout(() => {
        // 2. 彻底隐藏锁屏层
        lockScreen.style.display = 'none';
        
        // 3. 将真实内容克隆并注入到页面中
        appContainer.appendChild(template.content.cloneNode(true));
        
        // 4. 真实内容淡入显示，效果更平滑丝滑
        setTimeout(() => {
            appContainer.style.opacity = '1';
        }, 50);
        
    }, 500); // 500毫秒对应 css 中的 transition 时间
}
</script>
